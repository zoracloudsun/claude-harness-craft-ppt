<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Code Harness · 通用模版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /*
     * ══════════════════════════════════════════════════════════════
     *  通用模版 · Claude Code Harness PPT 框架
     *
     *  使用说明：
     *    1. 复制本文件，改名为 chapterN.html
     *    2. 修改 <title> 和 slide-meta 中的章节信息
     *    3. 复制需要的 slide 区块，填入内容
     *    4. 删除不需要的示例 slide
     *    5. 修改 JS 中 localStorage 的 KEY 为唯一值
     *
     *  布局 class 速查（加在 .slide 上）：
     *    .cover          封面页（居中大标题 + 光晕）
     *    .split          双栏均分
     *
     *  标签 · .pill（小圆角标签）：
     *    默认            青色
     *    .pill-gold      金色
     *    .pill-purple    紫色
     *    .pill-green     绿色
     *    .pill-red       红色
     *
     *  标签 · .tag（大号胶囊标签）：
     *    默认            青色
     *
     *  卡片 · .card（内容卡片）：
     *    默认            金色边框
     *    .card-cyan      青色边框
     *    .card-purple    紫色边框
     *    .card-green     绿色边框
     *    .card-red       红色边框
     *
     *  动画 class（加在子元素上）：
     *    .anim-up        从下淡入
     *    .anim-in        淡入
     *    .anim-scale     缩放淡入
     *    .anim-left      从左滑入
     *    .anim-right     从右滑入
     *    .d1 ~ .d8       延迟阶梯 0.1s ~ 1.15s
     * ══════════════════════════════════════════════════════════════
     */

    /* ========== DESIGN TOKENS ========== */
    :root {
      --gold: #FFD700;
      --cyan: #00F3FF;
      --magenta: #FF00C8;
      --red: #FF4D4D;
      --green: #00C878;
      --purple: #B482FF;
      --dark: #0A0A0A;
      --dark-card: rgba(15, 15, 20, 0.85);
      --grid: rgba(40, 40, 40, 0.4);
      --text: #E8E8E8;
      --text-dim: rgba(255, 255, 255, 0.55);
      --gold-glow: rgba(255, 215, 0, 0.6);
      --cyan-glow: rgba(0, 243, 255, 0.6);
      --magenta-glow: rgba(255, 0, 200, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ========== GRID BACKGROUND ========== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
      animation: gridPulse 6s infinite alternate;
    }
    @keyframes gridPulse { 0% { opacity: 0.6; } 100% { opacity: 0.85; } }

    /* ========== SNOWFLAKE PARTICLES ========== */
    .snowflake {
      position: fixed;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      z-index: 1;
      animation: snowfall linear infinite, snowSway ease-in-out infinite;
    }
    @keyframes snowfall { 0% { top: -8px; opacity: 0; } 5% { opacity: 1; } 92% { opacity: 0.8; } 100% { top: 105vh; opacity: 0; } }
    @keyframes snowSway { 0%, 100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(18px) rotate(90deg); } 50% { transform: translateX(-12px) rotate(180deg); } 75% { transform: translateX(22px) rotate(270deg); } }

    /* ========== DECK CONTAINER ========== */
    .deck {
      width: 1920px;
      height: 1080px;
      position: relative;
      transform-origin: center center;
      z-index: 10;
    }

    /* ========== SLIDE BASE ========== */
    .slide {
      position: absolute;
      top:0;
      left: 0;
      width: 100%;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 120px 100px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      overflow: hidden;
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide:not(.active) { display: none !important; }

    /* ========== SLIDE HEADER ========== */
    .slide-head {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    .slide-meta {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.42);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .slide-meta strong { color: var(--gold); font-weight: 500; }

    /* ========== TYPOGRAPHY ========== */
    .tag {
      display: inline-block;
      background: rgba(0,30,50,0.6);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 20px;
      padding: 8px 24px;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 14px;
    }
    .slide-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      margin: 12px 0 6px;
      line-height: 1.15;
      color: white;
      text-shadow: 0 0 26px rgba(255,215,0,0.18);
    }
    .slide-title .gold    { color: var(--gold);    text-shadow: 0 0 14px var(--gold-glow); }
    .slide-title .cyan    { color: var(--cyan);    text-shadow: 0 0 14px var(--cyan-glow); }
    .slide-title .magenta { color: var(--magenta); text-shadow: 0 0 14px var(--magenta-glow); }

    .slide-subtitle {
      font-size: 1.22rem;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 28px;
    }

    /* ========== SLIDE BODY ========== */
    .slide-body {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ========== COVER PAGE ========== */
    .cover { align-items: center; justify-content: center; padding: 80px 120px; }
    .cover-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      text-align: center;
    }
    .cover-inner::before {
      content: "";
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(180,130,255,0.25);
      box-shadow: 0 0 120px rgba(180,130,255,0.25) inset, 0 0 90px rgba(180,130,255,0.15);
      z-index: -1;
    }
    .cover-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 5rem;
      line-height: 1.08;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #fff4bc 72%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 38px rgba(255,215,0,0.18);
      margin: 24px 0 8px;
    }
    .cover-sub {
      font-size: 2.65rem;
      font-weight: 800;
      color: var(--gold);
      text-shadow: 0 0 18px var(--gold-glow);
    }
    .cover-chapter {
      font-size: 1.55rem;
      color: var(--gold);
      margin-top: 24px;
      letter-spacing: 1px;
    }
    .cover-rule {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px auto;
    }
    .cover-en {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
    }

    /* ========== NAV CONTROLS ========== */
    .nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(10,10,10,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
    }
    .nav button {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }
    .nav .page-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      min-width: 80px;
      text-align: center;
    }
    .nav .dots { display: flex; gap: 6px; }
    .nav .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav .dot.active {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeInUp    { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn      { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn     { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideInLeft  { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

    .anim-up     { animation: fadeInUp 0.6s ease-out both; }
    .anim-in     { animation: fadeIn 0.6s ease-out both; }
    .anim-scale  { animation: scaleIn 0.7s ease-out both; }
    .anim-left   { animation: slideInLeft 0.6s ease-out both; }
    .anim-right  { animation: slideInRight 0.6s ease-out both; }

    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.55s; }
    .d5 { animation-delay: 0.7s; }
    .d6 { animation-delay: 0.85s; }
    .d7 { animation-delay: 1.0s; }
    .d8 { animation-delay: 1.15s; }

    /* ========== PILL TAGS ========== */
    .pill {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .pill-cyan   { background: rgba(0,243,255,0.15);   color: var(--cyan); }
    .pill-gold   { background: rgba(255,215,0,0.15);   color: var(--gold); }
    .pill-green  { background: rgba(0,200,120,0.15);   color: var(--green); }
    .pill-red    { background: rgba(255,77,77,0.15);    color: var(--red); }
    .pill-purple { background: rgba(180,130,255,0.15);  color: var(--purple); }

    /* ========== CONTENT CARDS ========== */
    .card {
      background: var(--dark-card);
      border-radius: 16px;
      padding: 28px 32px;
      border: 1px solid rgba(255,215,0,0.1);
    }
    .card h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: var(--gold);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .card p { font-size: 1rem; color: rgba(255,255,255,0.8); line-height: 1.7; }
    .card-cyan   { border-color: rgba(0,243,255,0.2); }
    .card-gold   { border-color: rgba(255,215,0,0.2); }
    .card-red    { border-color: rgba(255,77,77,0.2); }
    .card-green  { border-color: rgba(0,200,120,0.2); }
    .card-purple { border-color: rgba(180,130,255,0.2); }

    /* 居中内容 */
    .contain {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="snowfield"></div>

  <div class="deck" id="deck">

    <!--
      ═══════════════════════════════════════════════════════════
      SLIDE 1 · 封面页
      布局：.cover
      说明：修改 cover-title / cover-sub / cover-chapter / cover-en 即可
      ═══════════════════════════════════════════════════════════
    -->
    <section class="slide active cover" data-idx="1">
      <div class="cover-inner">
        <div class="tag anim-up d1">CHAPTER · 0N</div>
        <h1 class="cover-title anim-scale d2">Claude Code Harness</h1>
        <div class="cover-sub anim-up d3">核心要点 / 解析指南</div>
        <div class="cover-chapter anim-up d4">第 N 章：章节标题</div>
        <div class="cover-rule anim-in d5"></div>
        <div class="cover-en anim-in d6">English Subtitle · From X to Y</div>
      </div>
    </section>

    <!--
      ═══════════════════════════════════════════════════════════
      SLIDE 2 · 预留页（居中卡片占位）
      说明：占位页，后续替换内容
      ═══════════════════════════════════════════════════════════
    -->
    <section class="slide" data-idx="3">
      <header class="slide-head">
        <div class="slide-meta">
          <span>第N章：章节标题</span>
          <strong>02 / NN</strong>
        </div>
      </header>
      <div class="contain">
        <div class="pill pill-gold anim-in d1">CHAPTER · 0N</div>
        <h2 class="slide-title anim-up d2">预留内容页</h2>
        <div class="slide-subtitle anim-in d3">后续内容将补充至此</div>
        <div class="card anim-scale d4" style="max-width:700px;text-align:center;padding:40px">
          <div style="font-size:3rem;margin-bottom:15px">📦</div>
          <div style="font-family:'Orbitron',sans-serif;font-size:1.8rem;color:var(--gold);font-weight:700;margin-bottom:15px">内容待补充</div>
          <div style="font-size:1.1rem;color:rgba(255,255,255,0.8)">这一页已接入导航、页码与版式系统，后续内容可以直接替换此占位区域。</div>
          <div style="margin-top:24px">
            <div style="width:80px;height:80px;border-radius:50%;border:2px dashed rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto">
              <span style="font-size:2.4rem;color:rgba(255,215,0,0.3)">+</span>
            </div>
          </div>
        </div>
        <div style="font-size:0.9rem;color:rgba(255,255,255,0.3);margin-top:10px" class="anim-in d5">Claude Code Harness · Template</div>
      </div>
    </section>

  </div><!-- /deck -->

  <!-- NAV -->
  <div class="nav" id="nav">
    <button id="prevBtn" title="上一页">‹</button>
    <div class="dots" id="dots"></div>
    <div class="page-info" id="pageInfo">1 / 17</div>
    <button id="nextBtn" title="下一页">›</button>
  </div>

  <script>
    /*
     * ═══════════════════════════════════════════════════════════
     *  复制本文件后，修改以下 KEY 为章节唯一值
     *  例如：'ch1-slide'、'ch2-slide'、'preface-slide'
     * ═══════════════════════════════════════════════════════════
     */
    var KEY = 'template-slide';

    // ========== SNOWFLAKE GENERATOR ==========
    (function createSnow() {
      var field = document.getElementById('snowfield');
      var count = 45;
      for (var i = 0; i < count; i++) {
        var flake = document.createElement('div');
        flake.className = 'snowflake';
        var size = 1.5 + Math.random() * 4;
        var left = Math.random() * 100;
        var dur = 10 + Math.random() * 18;
        var sway = 3 + Math.random() * 6;
        var delay = Math.random() * dur;
        var opacity = 0.15 + Math.random() * 0.5;
        flake.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + left + '%;' +
          'opacity:' + opacity + ';' +
          'animation-duration:' + dur + 's,' + sway + 's;' +
          'animation-delay:' + delay + 's,' + (delay * 0.4) + 's;';
        field.appendChild(flake);
      }
    })();

    // ========== DECK ENGINE ==========
    var slides = Array.from(document.querySelectorAll('.slide'));
    var totalSlides = slides.length;
    var current = 0;

    var dotsContainer = document.getElementById('dots');
    var pageInfo = document.getElementById('pageInfo');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');

    slides.forEach(function(_, i) {
      var dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', function() { goTo(i); });
      dotsContainer.appendChild(dot);
    });

    function goTo(idx) {
      if (idx < 0 || idx >= totalSlides) return;
      slides[current].classList.remove('active');
      current = idx;
      slides[current].classList.add('active');
      slides[current].querySelectorAll('[class*="anim-"]').forEach(function(el) {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
      slides[current].querySelectorAll('.cover-title, .cover-rule').forEach(function(el) {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
      updateNav();
      savePos();
    }

    function updateNav() {
      pageInfo.textContent = (current + 1) + ' / ' + totalSlides;
      dotsContainer.querySelectorAll('.dot').forEach(function(d, i) {
        d.classList.toggle('active', i === current);
      });
    }

    prevBtn.addEventListener('click', function() { goTo(current - 1); });
    nextBtn.addEventListener('click', function() { goTo(current + 1); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault(); goTo(current + 1);
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); goTo(current - 1);
      }
      if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      if (e.key === 'End')  { e.preventDefault(); goTo(totalSlides - 1); }
    });

    function savePos() {
      try { localStorage.setItem(KEY, current); } catch(e) {}
    }
    function loadPos() {
      try {
        var saved = parseInt(localStorage.getItem(KEY), 10);
        if (!isNaN(saved) && saved >= 0 && saved < totalSlides) {
          goTo(saved); return true;
        }
      } catch(e) {}
      return false;
    }

    function rescale() {
      var deck = document.getElementById('deck');
      var padX = 40, padY = 120;
      var scale = Math.min(
        (window.innerWidth - padX) / 1920,
        (window.innerHeight - padY) / 1080
      );
      deck.style.transform = 'scale(' + (scale * 1.15) + ')';
    }
    window.addEventListener('resize', rescale);
    rescale();

    if (!loadPos()) goTo(0);
  </script>
</body>
</html>

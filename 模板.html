<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Code Harness · 前言全 11 页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== DESIGN SYSTEM (from 1.html) ========== */
    :root {
      --gold: #FFD700;
      --cyan: #00F3FF;
      --magenta: #FF00C8;
      --dark: #0A0A0A;
      --dark-card: rgba(15, 15, 20, 0.85);
      --grid: rgba(40, 40, 40, 0.4);
      --text: #E8E8E8;
      --text-dim: rgba(255, 255, 255, 0.55);
      --gold-glow: rgba(255, 215, 0, 0.6);
      --cyan-glow: rgba(0, 243, 255, 0.6);
      --magenta-glow: rgba(255, 0, 200, 0.6);
      --red: #FF4D4D;
      --green: #00C878;
      --purple: #B482FF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ========== GRID BACKGROUND ========== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
      animation: gridPulse 6s infinite alternate;
    }
    @keyframes gridPulse {
      0% { opacity: 0.6; }
      100% { opacity: 0.85; }
    }

    /* ========== SNOWFLAKE PARTICLES ========== */
    .snowflake {
      position: fixed;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      z-index: 1;
      animation: snowfall linear infinite, snowSway ease-in-out infinite;
    }
    @keyframes snowfall {
      0%   { top: -8px; opacity: 0; }
      5%   { opacity: 1; }
      92%  { opacity: 0.8; }
      100% { top: 105vh; opacity: 0; }
    }
    @keyframes snowSway {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25%      { transform: translateX(18px) rotate(90deg); }
      50%      { transform: translateX(-12px) rotate(180deg); }
      75%      { transform: translateX(22px) rotate(270deg); }
    }

    /* ========== DECK CONTAINER ========== */
    .deck {
      width: 1920px;
      height: 1080px;
      position: relative;
      transform-origin: center center;
      z-index: 10;
    }

    /* ========== SLIDE BASE ========== */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 120px 100px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .slide:not(.active) { display: none !important; }

    /* ========== TYPOGRAPHY ========== */
    .tag {
      display: inline-block;
      background: rgba(0,30,50,0.6);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 20px;
      padding: 8px 24px;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 24px;
    }

    .slide-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.6rem;
      font-weight: 700;
      margin: 12px 0 8px;
      line-height: 1.15;
    }
    .slide-title .gold   { color: var(--gold); text-shadow: 0 0 14px var(--gold-glow); }
    .slide-title .cyan   { color: var(--cyan); text-shadow: 0 0 14px var(--cyan-glow); }
    .slide-title .magenta{ color: var(--magenta); text-shadow: 0 0 14px var(--magenta-glow); }

    .slide-subtitle {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .slide-subtitle-en {
      font-size: 1.05rem;
      color: var(--text-dim);
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 28px;
    }

    /* ========== NAV CONTROLS ========== */
    .nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(10,10,10,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
    }
    .nav button {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }
    .nav .page-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      min-width: 80px;
      text-align: center;
    }
    .nav .dots {
      display: flex;
      gap: 6px;
    }
    .nav .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav .dot.active {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(0,243,255,0.15); }
      50%      { box-shadow: 0 0 20px rgba(0,243,255,0.35); }
    }

    .anim-up   { animation: fadeInUp 0.6s ease-out both; }
    .anim-in   { animation: fadeIn 0.6s ease-out both; }
    .anim-scale{ animation: scaleIn 0.7s ease-out both; }
    .anim-left { animation: slideInLeft 0.6s ease-out both; }
    .anim-right{ animation: slideInRight 0.6s ease-out both; }

    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.55s; }
    .d5 { animation-delay: 0.7s; }
    .d6 { animation-delay: 0.85s; }
    .d7 { animation-delay: 1.0s; }
    .d8 { animation-delay: 1.15s; }

    /* ========== SLIDE 1: COVER (from 1.html) ========== */
    .cover-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 5rem;
      font-weight: 700;
      margin: 24px 0;
      line-height: 1.1;
    }
    .cover-title .ct1 { color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); }
    .cover-title .ct2 { color: var(--cyan); text-shadow: 0 0 18px var(--cyan-glow); }
    .cover-title .ct3 { color: var(--magenta); text-shadow: 0 0 18px var(--magenta-glow); }

    @keyframes titleGlow {
      0%   { opacity: 0; transform: scale(0.8); }
      60%  { opacity: 0.8; }
      100% { opacity: 1; transform: scale(1);
        text-shadow:
          0 0 12px var(--gold), 0 0 20px var(--gold),
          0 0 12px var(--cyan), 0 0 20px var(--cyan),
          0 0 12px var(--magenta), 0 0 20px var(--magenta);
      }
    }
    .cover-title { animation: titleGlow 1.2s ease-out both; }

    .cover-sub {
      font-size: 2.6rem;
      font-weight: 600;
      margin: 28px 0;
      letter-spacing: 1px;
      color: var(--text);
    }

    .cover-divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 30px auto;
    }
    @keyframes slideIn {
      from { width: 0; }
      to   { width: 120px; }
    }
    .cover-divider { animation: slideIn 0.7s ease-out 1.2s both; }

    .cover-journey {
      font-size: 1.2rem;
      opacity: 0.8;
      letter-spacing: 2px;
      margin: 8px 0;
      color: var(--text-dim);
    }

    .cover-formula {
      font-size: 3.6rem;
      font-weight: 800;
      margin: 36px 0;
      line-height: 1.2;
    }
    .cover-formula .cf1 { color: white; }
    .cover-formula .cf2 { color: var(--cyan); text-shadow: 0 0 14px var(--cyan-glow); }
    .cover-formula .cf3 { color: var(--magenta); text-shadow: 0 0 14px var(--magenta-glow); }
    @keyframes formulaReveal {
      0%   { opacity: 0; transform: translateY(20px); }
      50%  { opacity: 0.6; }
      100% { opacity: 1; transform: translateY(0);
        text-shadow: 0 0 10px rgba(255,215,0,0.3), 0 0 16px var(--cyan), 0 0 16px var(--magenta);
      }
    }
    .cover-formula { animation: formulaReveal 1.4s ease-out 2.0s both; }

    .cover-footnote {
      font-size: 1.05rem;
      opacity: 0.7;
      margin-top: 16px;
      color: var(--text-dim);
    }
    .cover-footnote { animation: fadeInUp 0.7s ease-out 3.0s both; }

    .cover-explain {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 12px;
      font-size: 1rem;
      color: var(--text-dim);
      opacity: 0.6;
    }
    .cover-explain { animation: fadeIn 0.8s ease-out 3.4s both; }

    /* ========== SLIDE 2: PAIN POINTS ========== */
    .pain-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 1600px;
      margin-top: 20px;
    }
    .pain-card {
      background: var(--dark-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 36px 24px 32px;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .pain-card:hover {
      border-color: rgba(0,243,255,0.3);
      transform: translateY(-4px);
    }
    .pain-card .pain-icon {
      font-size: 1.8rem;
      margin-bottom: 14px;
      display: block;
    }
    .pain-card .pain-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--cyan);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .pain-card .pain-title {
      font-size: 1.65rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--gold);
    }
    .pain-card .pain-desc {
      font-size: 1.15rem;
      line-height: 1.65;
      color: var(--text-dim);
    }
    .pain-card::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pain-card:hover::after { opacity: 1; }

    /* ========== SLIDE 3: PARADIGM SHIFT ========== */
    .paradigm-wrap {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
      max-width: 1500px;
      margin-top: 20px;
    }
    .paradigm-box {
      background: var(--dark-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: left;
    }
    .paradigm-box.left  { border-color: rgba(255,255,255,0.1); }
    .paradigm-box.right {
      border-color: rgba(0,243,255,0.25);
      box-shadow: 0 0 30px rgba(0,243,255,0.08);
    }
    .paradigm-box .pb-label {
      font-family: 'Orbitron', sans-serif;
      font-size: .95rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .paradigm-box.left .pb-label  { color: var(--text-dim); }
    .paradigm-box.right .pb-label { color: var(--cyan); }
    .paradigm-box .pb-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 28px;
    }
    .paradigm-box.left .pb-title  { color: rgba(255,255,255,0.5); }
    .paradigm-box.right .pb-title { color: var(--gold); }
    .paradigm-box .pb-item {
      font-size: 1.3rem;
      line-height: 1.5;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .paradigm-box.left .pb-item  { color: rgba(255,255,255,0.4); }
    .paradigm-box.right .pb-item { color: var(--text); }
    .paradigm-box .pb-item .pb-icon {
      font-size: 1.45rem;
      flex-shrink: 0;
    }
    .paradigm-arrow {
      font-size: 3.5rem;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
      animation: arrowPulse 2s infinite;
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .paradigm-note {
      font-size: 1rem;
      color: var(--magenta);
      margin-top: 24px;
      letter-spacing: 2px;
    }

    /* ========== SLIDE 4: FORMULA ========== */
    .formula-main {
      font-family: 'Orbitron', sans-serif;
      font-size: 4.5rem;
      font-weight: 700;
      margin: 20px 0 8px;
      line-height: 1.2;
    }
    .formula-main .f-agent { color: white; }
    .formula-main .f-model { color: var(--cyan); text-shadow: 0 0 16px var(--cyan-glow); }
    .formula-main .f-harness { color: var(--magenta); text-shadow: 0 0 16px var(--magenta-glow); }
    .formula-main .f-eq, .formula-main .f-plus {
      color: var(--text-dim);
      font-weight: 400;
    }
    .formula-label {
      font-size: 1.15rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .formula-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      width: 100%;
      max-width: 1300px;
      margin-top: 10px;
    }
    .formula-col {
      background: var(--dark-card);
      border-radius: 16px;
      padding: 36px 40px;
      text-align: left;
    }
    .formula-col.model-col {
      border: 1px solid rgba(0,243,255,0.15);
    }
    .formula-col.harness-col {
      border: 1px solid rgba(255,0,200,0.2);
    }
    .formula-col .fc-head {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 2px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .formula-col.model-col .fc-head  { color: var(--cyan); }
    .formula-col.harness-col .fc-head { color: var(--magenta); }
    .formula-col .fc-item {
      font-size: 1.25rem;
      line-height: 1.5;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-left: 20px;
      position: relative;
    }
    .formula-col .fc-item::before {
      content: "";
      position: absolute;
      left: 0; top: 10px;
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .formula-col.model-col .fc-item::before  { background: var(--cyan); opacity: 0.5; }
    .formula-col.harness-col .fc-item::before { background: var(--magenta); opacity: 0.7; }
    .formula-verdict {
      font-size: 1.3rem;
      color: var(--gold);
      text-shadow: 0 0 12px var(--gold-glow);
      margin-top: 20px;
      letter-spacing: 1px;
    }

    /* ========== SLIDE 5: FOUR LAYERS ========== */
    .layers-wrap {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      max-width: 1300px;
      margin-top: 10px;
    }
    .layer-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 30px;
      align-items: center;
      background: var(--dark-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 28px 40px;
      transition: border-color 0.3s, transform 0.3s;
    }
    .layer-row:hover {
      transform: translateX(6px);
    }
    .layer-row.l4 { border-left: 4px solid var(--magenta); }
    .layer-row.l3 { border-left: 4px solid var(--cyan); }
    .layer-row.l2 { border-left: 4px solid var(--gold); }
    .layer-row.l1 { border-left: 4px solid #888; }
    .layer-row.l4:hover { border-color: var(--magenta); }
    .layer-row.l3:hover { border-color: var(--cyan); }
    .layer-row.l2:hover { border-color: var(--gold); }
    .layer-row.l1:hover { border-color: #aaa; }
    .layer-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
    }
    .layer-row.l4 .layer-label { color: var(--magenta); }
    .layer-row.l3 .layer-label { color: var(--cyan); }
    .layer-row.l2 .layer-label { color: var(--gold); }
    .layer-row.l1 .layer-label { color: #999; }
    .layer-content {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .layer-name {
      font-size: 1.5rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .layer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .layer-desc {
      font-size: 1.15rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .layers-caption {
      font-size: 1rem;
      color: var(--text-dim);
      margin-top: 16px;
      font-style: italic;
    }

    /* ========== SLIDE 6: COURSE MAP ========== */
    .map-table {
      width: 100%;
      max-width: 1500px;
      border-collapse: separate;
      border-spacing: 0 8px;
      margin-top: 10px;
    }
    .map-table th {
      font-family: 'JetBrains Mono', monospace;
      font-size: .95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 8px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .map-table td {
      padding: 18px 20px;
      font-size: 1.2rem;
      background: var(--dark-card);
      border-top: 1px solid rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .map-table tr td:first-child {
      border-left: 4px solid var(--cyan);
      border-radius: 10px 0 0 10px;
    }
    .map-table tr td:last-child {
      border-radius: 0 10px 10px 0;
    }
    .map-table .module-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 500;
    }
    .module-base   { background: rgba(0,243,255,0.12); color: var(--cyan); }
    .module-core   { background: rgba(255,215,0,0.12); color: var(--gold); }
    .module-eco    { background: rgba(180,130,255,0.12); color: #B482FF; }
    .module-practice { background: rgba(0,200,120,0.12); color: #00C878; }
    .map-table .ch-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      color: var(--gold);
    }
    .map-table .ch-title {
      font-weight: 600;
      color: white;
    }
    .map-table .ch-key {
      font-size: 1.05rem;
      color: var(--text-dim);
    }
    .map-note {
      font-size: 1rem;
      color: var(--text-dim);
      margin-top: 12px;
      opacity: 0.6;
    }

    /* ========== SLIDE 7: LEARNING PATH ========== */
    .path-track {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      width: 100%;
      max-width: 1500px;
      margin-top: 10px;
      position: relative;
    }
    /* connecting line */
    .path-track::before {
      content: "";
      position: absolute;
      top: 52px;
      left: 80px;
      right: 80px;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--gold), #B482FF, var(--magenta));
      z-index: 0;
    }
    .path-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    .path-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;

    /* Scale handled by JS rescale() for precision */
  </style>

<body>
  <!-- SNOWFLAKES (generated by JS below) -->
  <div id="snowfield"></div>

  <!-- DECK -->
  <div class="deck" id="deck">

    <!-- ==================== SLIDE 1:  ==================== -->
    <div class="slide active" data-idx="1">
      
    </div>

    <!-- ==================== SLIDE 2:  ==================== -->
    <div class="slide" data-idx="2">
      
    </div>

    <!-- ==================== SLIDE 3:  ==================== -->
    <div class="slide" data-idx="3">
      
    </div>

    <!-- ==================== SLIDE 4:  ==================== -->
    <div class="slide" data-idx="4">
      
    </div>

    <!-- ==================== SLIDE 5:  ==================== -->
    <div class="slide" data-idx="5">
      
    </div>

    <!-- ==================== SLIDE 6:  ==================== -->
    <div class="slide" data-idx="6">
      
    </div>

    <!-- ==================== SLIDE 8:  ==================== -->
    <div class="slide" data-idx="8">
      
    </div>

    <!-- ==================== SLIDE 9:  ==================== -->
    <div class="slide" data-idx="9">
      
    </div>

    <!-- ==================== SLIDE 10:  ==================== -->
    <div class="slide" data-idx="10">
      <
    </div>

    <!-- ==================== SLIDE 11:  ==================== -->
    <div class="slide" data-idx="11">
      
    </div>

  </div><!-- /deck -->

  <!-- NAV -->
  <div class="nav" id="nav">
    <button id="prevBtn" title="上一页">‹</button>
    <div class="dots" id="dots"></div>
    <div class="page-info" id="pageInfo">2 / 11</div>
    <button id="nextBtn" title="下一页">›</button>
  </div>

  <script>
    // ========== SNOWFLAKE GENERATOR ==========
    (function createSnow() {
      const field = document.getElementById('snowfield');
      const count = 45;
      for (let i = 0; i < count; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = 1.5 + Math.random() * 4;
        const left = Math.random() * 100;
        const dur = 10 + Math.random() * 18;
        const sway = 3 + Math.random() * 6;
        const delay = Math.random() * dur;
        const opacity = 0.15 + Math.random() * 0.5;
        flake.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + left + '%;' +
          'opacity:' + opacity + ';' +
          'animation-duration:' + dur + 's,' + sway + 's;' +
          'animation-delay:' + delay + 's,' + (delay * 0.4) + 's;';
        field.appendChild(flake);
      }
    })();

    // ========== DECK ENGINE ==========
    const slides = Array.from(document.querySelectorAll('.slide'));
    const totalSlides = slides.length; // 11 (slide 1~11)
    let current = 0;

    const dotsContainer = document.getElementById('dots');
    const pageInfo = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // Create dots
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(idx) {
      if (idx < 0 || idx >= totalSlides) return;
      slides[current].classList.remove('active');
      current = idx;
      slides[current].classList.add('active');
      // Reset animations
      slides[current].querySelectorAll('[class*="anim-"]').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // reflow
        el.style.animation = '';
      });
      // Also reset cover-specific animations
      slides[current].querySelectorAll('.cover-title, .cover-divider, .cover-formula, .cover-footnote, .cover-explain').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
      updateNav();
      savePos();
    }

    function updateNav() {
      const slideNum = current + 1;
      pageInfo.textContent = slideNum + ' / ' + totalSlides;
      dotsContainer.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        goTo(current + 1);
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        goTo(current - 1);
      }
      if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      if (e.key === 'End')  { e.preventDefault(); goTo(totalSlides - 1); }
    });

    // Persist position
    function savePos() {
      try { localStorage.setItem('preface-slide', current); } catch(e) {}
    }
    function loadPos() {
      try {
        const saved = parseInt(localStorage.getItem('preface-slide'), 10);
        if (!isNaN(saved) && saved >= 0 && saved < totalSlides) {
          goTo(saved);
          return true;
        }
      } catch(e) {}
      return false;
    }

    // Responsive scale
    function rescale() {
      const deck = document.getElementById('deck');
      const padX = 40, padY = 120;
      const scale = Math.min(
        (window.innerWidth - padX) / 1920,
        (window.innerHeight - padY) / 1080
      );
      deck.style.transform = 'scale(' + (scale * 1.15) + ')';
    }
    window.addEventListener('resize', rescale);
    rescale();

    // Init — show slide 1 (cover), restore saved position if any
    if (!loadPos()) goTo(0);
  </script>
</body>

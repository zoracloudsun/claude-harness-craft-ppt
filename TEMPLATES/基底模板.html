<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Code Harness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== DESIGN SYSTEM (from 1.html) ========== */
    :root {
      --gold: #FFD700;
      --cyan: #00F3FF;
      --magenta: #FF00C8;
      --dark: #0A0A0A;
      --dark-card: rgba(15, 15, 20, 0.85);
      --grid: rgba(40, 40, 40, 0.4);
      --text: #E8E8E8;
      --text-dim: rgba(255, 255, 255, 0.55);
      --gold-glow: rgba(255, 215, 0, 0.6);
      --cyan-glow: rgba(0, 243, 255, 0.6);
      --magenta-glow: rgba(255, 0, 200, 0.6);
      --red: #FF4D4D;
      --green: #00C878;
      --purple: #B482FF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ========== GRID BACKGROUND ========== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
      animation: gridPulse 6s infinite alternate;
    }
    @keyframes gridPulse {
      0% { opacity: 0.6; }
      100% { opacity: 0.85; }
    }

    /* ========== SNOWFLAKE PARTICLES ========== */
    .snowflake {
      position: fixed;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      z-index: 1;
      animation: snowfall linear infinite, snowSway ease-in-out infinite;
    }
    @keyframes snowfall {
      0%   { top: -8px; opacity: 0; }
      5%   { opacity: 1; }
      92%  { opacity: 0.8; }
      100% { top: 105vh; opacity: 0; }
    }
    @keyframes snowSway {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25%      { transform: translateX(18px) rotate(90deg); }
      50%      { transform: translateX(-12px) rotate(180deg); }
      75%      { transform: translateX(22px) rotate(270deg); }
    }

    /* ========== DECK CONTAINER ========== */
    .deck {
      width: 1920px;
      height: 1080px;
      position: relative;
      transform-origin: center center;
      z-index: 10;
    }

    /* ========== SLIDE BASE ========== */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 120px 100px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .slide:not(.active) { display: none !important; }

    /* ========== TYPOGRAPHY ========== */
    .tag {
      display: inline-block;
      background: rgba(0,30,50,0.6);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 20px;
      padding: 8px 24px;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 24px;
    }

    .slide-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.6rem;
      font-weight: 700;
      margin: 12px 0 8px;
      line-height: 1.15;
    }
    .slide-title .gold   { color: var(--gold); text-shadow: 0 0 14px var(--gold-glow); }
    .slide-title .cyan   { color: var(--cyan); text-shadow: 0 0 14px var(--cyan-glow); }
    .slide-title .magenta{ color: var(--magenta); text-shadow: 0 0 14px var(--magenta-glow); }

    .slide-subtitle {
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .slide-subtitle-en {
      font-size: 1.05rem;
      color: var(--text-dim);
      opacity: 0.6;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 28px;
    }

    /* ========== NAV CONTROLS ========== */
    .nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(10,10,10,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
    }
    .nav button {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav button:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }
    .nav .page-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      min-width: 80px;
      text-align: center;
    }
    .nav .dots {
      display: flex;
      gap: 6px;
    }
    .nav .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav .dot.active {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(0,243,255,0.15); }
      50%      { box-shadow: 0 0 20px rgba(0,243,255,0.35); }
    }

    .anim-up   { animation: fadeInUp 0.6s ease-out both; }
    .anim-in   { animation: fadeIn 0.6s ease-out both; }
    .anim-scale{ animation: scaleIn 0.7s ease-out both; }
    .anim-left { animation: slideInLeft 0.6s ease-out both; }
    .anim-right{ animation: slideInRight 0.6s ease-out both; }

    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.55s; }
    .d5 { animation-delay: 0.7s; }
    .d6 { animation-delay: 0.85s; }
    .d7 { animation-delay: 1.0s; }
    .d8 { animation-delay: 1.15s; }

    /* ========== SLIDE 1: COVER (from 1.html) ========== */
    .cover-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 5rem;
      font-weight: 700;
      margin: 24px 0;
      line-height: 1.1;
    }
    .cover-title .ct1 { color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); }
    .cover-title .ct2 { color: var(--cyan); text-shadow: 0 0 18px var(--cyan-glow); }
    .cover-title .ct3 { color: var(--magenta); text-shadow: 0 0 18px var(--magenta-glow); }

    @keyframes titleGlow {
      0%   { opacity: 0; transform: scale(0.8); }
      60%  { opacity: 0.8; }
      100% { opacity: 1; transform: scale(1);
        text-shadow:
          0 0 12px var(--gold), 0 0 20px var(--gold),
          0 0 12px var(--cyan), 0 0 20px var(--cyan),
          0 0 12px var(--magenta), 0 0 20px var(--magenta);
      }
    }
    .cover-title { animation: titleGlow 1.2s ease-out both; }

    .cover-sub {
      font-size: 2.6rem;
      font-weight: 600;
      margin: 28px 0;
      letter-spacing: 1px;
      color: var(--text);
    }

    .cover-divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 30px auto;
    }
    @keyframes slideIn {
      from { width: 0; }
      to   { width: 120px; }
    }
    .cover-divider { animation: slideIn 0.7s ease-out 1.2s both; }

    .cover-journey {
      font-size: 1.2rem;
      opacity: 0.8;
      letter-spacing: 2px;
      margin: 8px 0;
      color: var(--text-dim);
    }

    .cover-formula {
      font-size: 3.6rem;
      font-weight: 800;
      margin: 36px 0;
      line-height: 1.2;
    }
    .cover-formula .cf1 { color: white; }
    .cover-formula .cf2 { color: var(--cyan); text-shadow: 0 0 14px var(--cyan-glow); }
    .cover-formula .cf3 { color: var(--magenta); text-shadow: 0 0 14px var(--magenta-glow); }
    @keyframes formulaReveal {
      0%   { opacity: 0; transform: translateY(20px); }
      50%  { opacity: 0.6; }
      100% { opacity: 1; transform: translateY(0);
        text-shadow: 0 0 10px rgba(255,215,0,0.3), 0 0 16px var(--cyan), 0 0 16px var(--magenta);
      }
    }
    .cover-formula { animation: formulaReveal 1.4s ease-out 2.0s both; }

    .cover-footnote {
      font-size: 1.05rem;
      opacity: 0.7;
      margin-top: 16px;
      color: var(--text-dim);
    }
    .cover-footnote { animation: fadeInUp 0.7s ease-out 3.0s both; }

    .cover-explain {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 12px;
      font-size: 1rem;
      color: var(--text-dim);
      opacity: 0.6;
    }
    .cover-explain { animation: fadeIn 0.8s ease-out 3.4s both; }

    /* Scale handled by JS rescale() for precision */
  </style>
</head>
<body>
  <!-- SNOWFLAKES (generated by JS below) -->
  <div id="snowfield"></div>

  <!-- DECK -->
  <div class="deck" id="deck">

    <!-- ==================== SLIDE 1:  ==================== -->
    <div class="slide active" data-idx="1">
      
    </div>

    <!-- ==================== SLIDE 2:  ==================== -->
    <div class="slide" data-idx="2">
      
    </div>

    <!-- ==================== SLIDE 3:  ==================== -->
    <div class="slide" data-idx="3">
      
    </div>


  </div><!-- /deck -->

  <!-- NAV -->
  <div class="nav" id="nav">
    <button id="prevBtn" title="上一页">‹</button>
    <div class="dots" id="dots"></div>
    <div class="page-info" id="pageInfo">2 / 11</div>
    <button id="nextBtn" title="下一页">›</button>
  </div>

  <script>
    // ========== SNOWFLAKE GENERATOR ==========
    (function createSnow() {
      const field = document.getElementById('snowfield');
      const count = 45;
      for (let i = 0; i < count; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = 1.5 + Math.random() * 4;
        const left = Math.random() * 100;
        const dur = 10 + Math.random() * 18;
        const sway = 3 + Math.random() * 6;
        const delay = Math.random() * dur;
        const opacity = 0.15 + Math.random() * 0.5;
        flake.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + left + '%;' +
          'opacity:' + opacity + ';' +
          'animation-duration:' + dur + 's,' + sway + 's;' +
          'animation-delay:' + delay + 's,' + (delay * 0.4) + 's;';
        field.appendChild(flake);
      }
    })();

    // ========== DECK ENGINE ==========
    const slides = Array.from(document.querySelectorAll('.slide'));
    const totalSlides = slides.length; // 11 (slide 1~11)
    let current = 0;

    const dotsContainer = document.getElementById('dots');
    const pageInfo = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // Create dots
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(idx) {
      if (idx < 0 || idx >= totalSlides) return;
      slides[current].classList.remove('active');
      current = idx;
      slides[current].classList.add('active');
      // Reset animations
      slides[current].querySelectorAll('[class*="anim-"]').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // reflow
        el.style.animation = '';
      });
      // Also reset cover-specific animations
      slides[current].querySelectorAll('.cover-title, .cover-divider, .cover-formula, .cover-footnote, .cover-explain').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });
      updateNav();
      savePos();
    }

    function updateNav() {
      const slideNum = current + 1;
      pageInfo.textContent = slideNum + ' / ' + totalSlides;
      dotsContainer.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        goTo(current + 1);
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        goTo(current - 1);
      }
      if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      if (e.key === 'End')  { e.preventDefault(); goTo(totalSlides - 1); }
    });

    // Persist position
    function savePos() {
      try { localStorage.setItem('preface-slide', current); } catch(e) {}
    }
    function loadPos() {
      try {
        const saved = parseInt(localStorage.getItem('preface-slide'), 10);
        if (!isNaN(saved) && saved >= 0 && saved < totalSlides) {
          goTo(saved);
          return true;
        }
      } catch(e) {}
      return false;
    }

    // Responsive scale
    function rescale() {
      const deck = document.getElementById('deck');
      const padX = 40, padY = 120;
      const scale = Math.min(
        (window.innerWidth - padX) / 1920,
        (window.innerHeight - padY) / 1080
      );
      deck.style.transform = 'scale(' + (scale * 1.15) + ')';
    }
    window.addEventListener('resize', rescale);
    rescale();

    // Init — show slide 1 (cover), restore saved position if any
    if (!loadPos()) goTo(0);
  </script>
</body>
</html>
